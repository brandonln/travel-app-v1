<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
            cursor: default;
        }
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            color: #333;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid #ddd;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            z-index: 2000;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            white-space: nowrap;
        }
        #notification.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="notification"></div>
    <div id="map"></div>
    <script>
        function Location(lat, lon, name) {
            this.lat = lat;
            this.lon = lon;
            this.name = name;
        }

        let videoOrderBy = 'date';
        let videoType = 'vlog';

        const map = L.map('map', {
            maxBounds: L.latLngBounds([[-90, -180], [90, 180]])
        }).setView([-25.96716, 27.66245], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            minZoom: 5,
            maxZoom: 11
        }).addTo(map);

        const OptionsControl = L.Control.extend({
            options: {
                label: '',
                name: '',
                options: [],
                onChange: null
            },
            onAdd: function(map) {
                const container = L.DomUtil.create('div', 'leaflet-control');
                const label = L.DomUtil.create('div', '', container);
                label.textContent = this.options.label;

                const onChange = this.options.onChange;
                this.options.options.forEach((opt, i) => {
                    const optLabel = L.DomUtil.create('label', '', container);
                    const input = L.DomUtil.create('input', '', optLabel);
                    input.type = 'radio';
                    input.name = this.options.name;
                    input.value = opt.value;
                    if (i === 0) input.checked = true;
                    input.addEventListener('change', (e) => {
                        onChange(e.target.value);
                    });
                    optLabel.appendChild(document.createTextNode(opt.label));
                });

                return container;
            }
        });

        new OptionsControl({
            position: 'bottomright',
            label: 'Order by:',
            name: 'videoOrder',
            options: [
                { value: 'date', label: 'Date' },
                { value: 'relevance', label: 'Relevance' }
            ],
            onChange: (value) => { videoOrderBy = value; }
        }).addTo(map);

        new OptionsControl({
            position: 'bottomright',
            label: 'Video Type:',
            name: 'videoType',
            options: [
                { value: 'vlog', label: 'Vlog' },
                { value: 'walking tour', label: 'Walking Tour' }
            ],
            onChange: (value) => { videoType = value; }
        }).addTo(map);

        map.on('dragstart', function() {
            document.getElementById('map').style.cursor = 'grabbing';
        });

        map.on('dragend', function() {
            document.getElementById('map').style.cursor = 'default';
        });

        map.on('zoomend', async function() {
            if (map.getZoom() == 11) {
                var locations = await getLocations()
                getBboxVideos(locations)
            }
        })


        async function getLocations() {
            bounds = map.getBounds()
            var bbox = `
                (${bounds.getSouth()}, ${bounds.getWest()}, 
                ${bounds.getNorth()}, ${bounds.getEast()})
            `;
            var query = `
                [out:json];
                node["place"="city"]${bbox};
                out;
            `;
            try {
                var response = await fetch(
                    "https://overpass-api.de/api/interpreter",
                    {
                        method: "POST",
                        body: "data=" + encodeURIComponent(query),
                    }
                )

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                var locations = []
                let location;

                for (element of data.elements) {
                    location = new Location(element.lat, element.lon, element.tags.name)
                    locations.push(location)
                }

                return locations

            } catch (error) {
                console.error(error);
            }
        }

        async function getBboxVideos(locations) {
            console.log(locations)
        }


        async function getLocation(latitude, longitude) {
            try {
                const response = await fetch(`/api/location/${latitude}/${longitude}`);
                const data = await response.json();
                
                if (response.ok && data.location_found) {
                    console.log(data)
                } 
                // no error handing for 404

            } catch (error) {
                console.error(error);
            }
        }


        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        async function getVideo(latitude, longitude, orderBy = videoOrderBy, type = videoType) {
            try {
                const response = await fetch(`/api/video/${latitude}/${longitude}?orderBy=${orderBy}&videoType=${type}`);
                const data = await response.json();
                if (response.ok && data.video_found) {
                    window.open(data.url, '_blank')
                }
                else if (!data.location_found) {
                    showNotification('Try a different location...');
                }

            } catch (error) {
                console.error(error);
            }
        }

        function handleMapInteraction(e) {
            getVideo(e.latlng.lat, e.latlng.lng);
        }

        map.on('click', handleMapInteraction);
        map.on('tap', handleMapInteraction);

    </script>
</body>
</html>
