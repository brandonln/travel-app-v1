<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
            cursor: default;
        }
        .leaflet-control-order {
            background-color: white !important;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.65);
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            width: auto;
            z-index: 1000;
            min-width: 200px;
            display: block !important;
        }
        .leaflet-control-order label {
            display: inline-block;
            margin: 0 10px 0 0;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }
        .leaflet-control-order input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            color: #333;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid #ddd;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            z-index: 2000;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            white-space: nowrap;
        }
        #notification.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="notification"></div>
    <div id="map"></div>
    <script>
        function Location(lat, lon, name) {
            this.lat = lat;
            this.lon = lon;
            this.name = name;
        }

        let videoOrderBy = 'date';
        let videoType = 'vlog';

        const map = L.map('map', {
            maxBounds: L.latLngBounds([[-90, -180], [90, 180]])
        }).setView([-25.96716, 27.66245], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            minZoom: 5,
            maxZoom: 11
        }).addTo(map);

        const VideoTypeControl = L.Control.extend({
            onAdd: function(map) {
                const container = L.DomUtil.create('div', 'leaflet-control leaflet-control-order');

                const instruction = L.DomUtil.create('div', '', container);
                instruction.style.fontSize = '12px';
                instruction.style.marginBottom = '5px';

                const instructionText = L.DomUtil.create('div', '', instruction);
                instructionText.style.fontStyle = 'italic';
                instructionText.textContent = 'Drag to move, click or tap for a:';

                const blankLine1 = L.DomUtil.create('div', '', container);
                blankLine1.style.height = '5px';

                const vlogLabel = L.DomUtil.create('label', '', container);
                const vlogInput = L.DomUtil.create('input', '', vlogLabel);
                vlogInput.type = 'radio';
                vlogInput.name = 'videoType';
                vlogInput.value = 'vlog';
                vlogInput.checked = true;
                vlogLabel.appendChild(document.createTextNode('Vlog'));

                const walkingTourLabel = L.DomUtil.create('label', '', container);
                const walkingTourInput = L.DomUtil.create('input', '', walkingTourLabel);
                walkingTourInput.type = 'radio';
                walkingTourInput.name = 'videoType';
                walkingTourInput.value = 'walking tour';
                walkingTourLabel.appendChild(document.createTextNode('Walking Tour'));

                vlogInput.addEventListener('change', function() {
                    videoType = 'vlog';
                });

                walkingTourInput.addEventListener('change', function() {
                    videoType = 'walking tour';
                });

                return container;
            }
        });

        const VideoOrderControl = L.Control.extend({
            onAdd: function(map) {
                const container = L.DomUtil.create('div', 'leaflet-control leaflet-control-order');

                const orderText = L.DomUtil.create('div', '', container);
                orderText.style.fontSize = '12px';
                orderText.style.marginBottom = '5px';
                orderText.style.fontStyle = 'italic';
                orderText.textContent = 'Ordered by:';

                const blankLine = L.DomUtil.create('div', '', container);
                blankLine.style.height = '5px';

                const dateLabel = L.DomUtil.create('label', '', container);
                const dateInput = L.DomUtil.create('input', '', dateLabel);
                dateInput.type = 'radio';
                dateInput.name = 'videoOrder';
                dateInput.value = 'date';
                dateInput.checked = true;
                dateLabel.appendChild(document.createTextNode('Date'));

                const relevanceLabel = L.DomUtil.create('label', '', container);
                const relevanceInput = L.DomUtil.create('input', '', relevanceLabel);
                relevanceInput.type = 'radio';
                relevanceInput.name = 'videoOrder';
                relevanceInput.value = 'relevance';
                relevanceLabel.appendChild(document.createTextNode('Relevance'));

                dateInput.addEventListener('change', function() {
                    videoOrderBy = 'date';
                });

                relevanceInput.addEventListener('change', function() {
                    videoOrderBy = 'relevance';
                });

                return container;
            }
        });

        new VideoOrderControl({ position: 'bottomright' }).addTo(map);
        new VideoTypeControl({ position: 'bottomright' }).addTo(map);

        map.on('dragstart', function() {
            document.getElementById('map').style.cursor = 'grabbing';
        });

        map.on('dragend', function() {
            document.getElementById('map').style.cursor = 'default';
        });

        map.on('zoomend', async function() {
            if (map.getZoom() == 11) {
                var locations = await getLocations()
                getBboxVideos(locations)
            }
        })


        async function getLocations() {
            bounds = map.getBounds()
            var bbox = `
                (${bounds.getSouth()}, ${bounds.getWest()}, 
                ${bounds.getNorth()}, ${bounds.getEast()})
            `;
            var query = `
                [out:json];
                node["place"="city"]${bbox};
                out;
            `;
            try {
                var response = await fetch(
                    "https://overpass-api.de/api/interpreter",
                    {
                        method: "POST",
                        body: "data=" + encodeURIComponent(query),
                    }
                )

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                var locations = []
                let location;

                for (element of data.elements) {
                    location = new Location(element.lat, element.lon, element.tags.name)
                    locations.push(location)
                }

                return locations

            } catch (error) {
                console.error(error);
            }
        }

        async function getBboxVideos(locations) {
            console.log(locations)
        }


        async function getLocation(latitude, longitude) {
            try {
                const response = await fetch(`/api/location/${latitude}/${longitude}`);
                const data = await response.json();
                
                if (response.ok && data.location_found) {
                    console.log(data)
                } 
                // no error handing for 404

            } catch (error) {
                console.error(error);
            }
        }


        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        async function getVideo(latitude, longitude, orderBy = videoOrderBy, type = videoType) {
            try {
                const response = await fetch(`/api/video/${latitude}/${longitude}?orderBy=${orderBy}&videoType=${type}`);
                const data = await response.json();
                if (response.ok && data.video_found) {
                    window.open(data.url, '_blank')
                }
                else if (!data.location_found) {
                    showNotification('Try a different location...');
                }

            } catch (error) {
                console.error(error);
            }
        }

        function handleMapInteraction(e) {
            getVideo(e.latlng.lat, e.latlng.lng);
        }

        map.on('click', handleMapInteraction);
        map.on('tap', handleMapInteraction);

    </script>
</body>
</html>
