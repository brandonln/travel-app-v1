<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
            cursor: default;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        map.on('dragstart', function() {
            document.getElementById('map').style.cursor = 'grabbing';
        });

        map.on('dragend', function() {
            document.getElementById('map').style.cursor = 'default';
        });


        
        async function getLocation(latitude, longitude) {
            try {
                const response = await fetch(`/api/location/${latitude}/${longitude}`);
                const data = await response.json();
                
                if (response.ok && data.location_found) {
                    console.log(data)
                } 
                // no error handing for 404

            } catch (error) {
                console.error(error);
            }
        }

        async function getVideo(latitude, longitude) {
            try {
                const response = await fetch(`/api/video/${latitude}/${longitude}`);
                const data = await response.json();
                if (response.ok && data.video_found) {
                    window.open(data.url, '_blank')
                }
                else {
                    console.log(data)
                }

            } catch (error) {
                console.error(error);
            }
        }

        map.on('click', function(e) {
            getVideo(e.latlng.lat, e.latlng.lng);
        });

    </script>
</body>
</html>
